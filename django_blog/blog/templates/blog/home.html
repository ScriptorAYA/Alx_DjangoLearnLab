{% extends "blog/base.html" %}
{% block content %}
<h2>Home Page</h2>

{% if user.is_authenticated %}
    <p>Welcome, {{ user.username }}!</p>
    <a href="{% url 'profile' %}">Profile</a> |
    <a href="{% url 'logout' %}">Logout</a>
{% else %}
    <a href="{% url 'login' %}">Login</a> |
    <a href="{% url 'register' %}">Register</a>
{% endif %}

{% endblock %}
